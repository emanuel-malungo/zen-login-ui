<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign up for Zen Login - Replicating premium UI designs with precision.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="./assets/css/style.css">

    <!-- Favicon -->
    <link rel="shortcut icon" href="./assets/img/favicon.ico" type="image/x-icon">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>

    <title>Sign Up | Zen UI</title>
</head>
<body>
    
    <main class="auth-wrapper">
        <div class="auth-container">
            <!-- Left Illustration Section -->
            <section class="auth-illustration">
                <div class="illustration-content">
                    <div class="header-flex">
                        <h1>Get Started with Us</h1>
                        <p>Complete these easy steps to register your account.</p>
                    </div>
                    
                    <div class="step-cards">
                        <div class="step-card active">
                            <div class="step-number">1</div>
                            <div class="step-info">
                                <h3>Sign up your account</h3>
                            </div>
                        </div>
                        <div class="step-card">
                            <div class="step-number">2</div>
                            <div class="step-info">
                                <h3>Set up your workspace</h3>
                            </div>
                        </div>
                        <div class="step-card">
                            <div class="step-number">3</div>
                            <div class="step-info">
                                <h3>Set up your profile</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Right Form Section -->
            <section class="auth-form-container">
                <div class="form-content">
                    <div class="form-header">
                        <h2>Sign Up Account</h2>
                        <p>Enter your personal data to create your account.</p>
                    </div>

                    <div class="social-login">
                        <button type="button" class="social-btn">
                            <i class="ri-google-fill"></i> Google
                        </button>
                        <button type="button" class="social-btn">
                            <i class="ri-github-fill"></i> Github
                        </button>
                    </div>

                    <div class="divider">
                        <span>Or</span>
                    </div>

                    <form id="signup-form">
                        <div class="form-row">
                            <div class="input-group">
                                <label for="first-name">First Name</label>
                                <input type="text" id="first-name" placeholder="eg. John" required>
                            </div>
                            <div class="input-group">
                                <label for="last-name">Last Name</label>
                                <input type="text" id="last-name" placeholder="eg. Francisco" required>
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="eg. johnfrans@gmail.com" required>
                        </div>

                        <div class="input-group">
                            <label for="password">Password</label>
                            <div class="password-wrapper">
                                <input type="password" id="password" placeholder="Enter your password" required minlength="8">
                                <button type="button" id="toggle-password" class="toggle-btn">
                                    <i class="ri-eye-off-line"></i>
                                </button>
                            </div>
                            <small class="hint">Must be at least 8 characters.</small>
                        </div>

                        <button type="submit" class="submit-btn">Sign Up</button>
                    </form>

                    <p class="auth-footer">
                        Already have an account? <a href="#">Log in</a>
                    </p>
                </div>
            </section>
        </div>
    </main>

    <!-- JS -->
    <script src="./assets/js/script.js"></script>
</body>
</html>
